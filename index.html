<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Slipstream: Tokyo Night</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #08050E; }
    #game-container {
      width: 100%; height: 100%;
      position: relative;
      touch-action: none;
    }
    canvas { display: block; width: 100%; height: 100%; }

    #milestone-text {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -100%);
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      font-size: 36px;
      font-weight: 900;
      color: #FF2D7B;
      text-shadow: 0 0 40px rgba(255,45,123,0.6), 0 0 80px rgba(255,45,123,0.3);
      opacity: 0;
      letter-spacing: 4px;
      pointer-events: none;
      z-index: 12;
      transition: opacity 0.35s ease-out;
    }
    #milestone-text.perfect {
      font-size: clamp(42px, 12vw, 64px);
      letter-spacing: 0.28em;
      text-shadow:
        0 0 50px rgba(255,45,123,0.95),
        0 0 100px rgba(255,45,123,0.5),
        0 0 140px rgba(0,229,255,0.25);
      animation: perfect-pop 0.5s cubic-bezier(0.34, 1.45, 0.64, 1) both;
    }
    @keyframes perfect-pop {
      0% {
        transform: translate(-50%, -100%) scale(0.5);
        filter: blur(4px);
        opacity: 0;
      }
      55% {
        transform: translate(-50%, -100%) scale(1.08);
        filter: blur(0);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -100%) scale(1);
        opacity: 1;
      }
    }

    /* Screen Flash */
    #screen-flash {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,45,123,0.3);
      opacity: 0;
      pointer-events: none;
      z-index: 5;
      transition: opacity 0.12s ease-out, background 0.2s ease;
    }
    #screen-flash.perfect-hit {
      background: rgba(255,45,123,0.52);
      box-shadow: inset 0 0 120px rgba(0,229,255,0.12);
    }

    /* Game Over Overlay */
    #gameover {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(8,5,14,0.85);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      padding: min(36px, 4.5vw);
      z-index: 20;
      font-family: 'Orbitron', sans-serif;
      color: #F0E8FF;
    }
    #gameover.visible { display: flex; }
    #gameover h2 {
      font-size: 30px;
      letter-spacing: 6px;
      color: #FF2D7B;
      margin: 0 0 30px 0;
    }
    #final-score {
      font-size: 72px;
      font-weight: 900;
      line-height: 1.05;
      margin: 0 0 12px 0;
    }
    #new-best {
      font-size: 21px;
      color: #00E5FF;
      margin: 0 0 36px 0;
      display: none;
    }
    .stat-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 48px;
      margin: 0 0 48px 0;
      font-size: 21px;
      color: #8A7FA3;
      letter-spacing: 1.5px;
    }
    .stat-row span strong { color: #F0E8FF; }
    #retry-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 4.5px;
      color: #F0E8FF;
      background: transparent;
      border: 3px solid #FF2D7B;
      border-radius: 12px;
      padding: 24px 72px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      pointer-events: auto;
    }
    #retry-btn:hover, #retry-btn:active {
      background: rgba(255,45,123,0.15);
      box-shadow: 0 0 45px rgba(255,45,123,0.35);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <!-- Three.js canvas injected here -->

    <div id="milestone-text"></div>
    <div id="screen-flash"></div>

    <!-- Game Over -->
    <div id="gameover">
      <h2>GAME OVER</h2>
      <div id="final-score">0</div>
      <div id="new-best">⚡ NEW BEST</div>
      <div class="stat-row">
        <span>CHAIN <strong id="stat-chain">×0</strong></span>
        <span>DIST <strong id="stat-distance">0m</strong></span>
      </div>
      <button id="retry-btn">RETRY</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
